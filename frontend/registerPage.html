<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BELU | Cadastro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=search" />

    <link href="style.css" rel="stylesheet">
</head>

<body>
    <section id="Home">
        <nav class="navbar navbar-expand-lg bg-body-tertiary">
            <div class="container-fluid">
                <a class="navbar-brand" href="index.html">
                    <img src="images/BeLu.png" alt="logo" class="logo">
                </a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                    data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent"
                    aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarSupportedContent">
                    <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                        <li class="nav-item">
                            <a class="nav-link active" aria-current="page" href="index.html">
                                <strong>Belu</strong>
                            </a>
                        </li>
                        <li class="nav-item dropdown">
                            <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown"
                                aria-expanded="false">
                                Conta
                            </a>
                            <ul class="dropdown-menu">
                                <li><a class="dropdown-item" href="loginPage.html">Login</a></li>
                                <li><a class="dropdown-item" href="registerPage.html">Cadastrar-se</a></li>
                                <li><hr class="dropdown-divider"></li>
                                <li><a class="dropdown-item" href="#">Cadastrar Restaurante</a></li>
                            </ul>
                        </li>
                    </ul>
                    <form class="d-flex" role="search">
                        <input class="form-control me-2" type="search" placeholder="Buscar " aria-label="Search" />
                        <button class="btn btn-outline-success" type="submit">
                            <span class="material-symbols-outlined">search</span>
                        </button>
                    </form>
                </div>
            </div>
        </nav>
    </section>

    <section id="Body">
        <div class="Caixa-de-login">
            <h1> Criar Conta </h1>
            
            <label for="nome">Nome completo: </label>
            <input type="text" id="nome" placeholder="Seu nome: " class="form-control mb-3" />

            <label for="email">E-mail: </label>
            <input type="email" id="email" placeholder="Email: " class="form-control mb-3" />

            <label for="senha">Crie uma senha: </label>
            <input type="password" id="senha" placeholder="Senha: " class="form-control mb-3" />

            <label for="confirma-senha">Confirme sua senha: </label>
            <input type="password" id="confirma-senha" placeholder="Repita a senha: " class="form-control mb-3" />

            <button class="btn-login w-100">Finalizar Cadastro</button>
            
            <p class="mt-3 text-center">
                Já tem uma conta? <a href="Login.html" style="color: #C48781; text-decoration: none; font-weight: bold;">Faça Login</a>
            </p>
        </div>
    </section>

    <footer>
        </footer>

    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"
        integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r"
        crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js"
        integrity="sha384-G/EV+4j2dNv+tEPo3++6LCgdCROaejBqfUeNjuKAiuXbjrxilcCdDz6ZAVfHWe1Y"
        crossorigin="anonymous"></script>
</body>
